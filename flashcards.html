<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Vocabulaire - Bac Espagnol</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #c0392b;
            --dark: #1a1a2e;
            --card: #0f3460;
            --accent: #e94560;
            --gold: #f5c518;
            --text: #eaeaea;
            --blue: #2980b9;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            max-width: 600px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* FLASHCARD CONTAINER */
        .flashcard-container {
            perspective: 1000px;
            width: 350px;
            height: 250px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
        }

        .flashcard-container.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .flashcard-front {
            background: var(--card);
            color: white;
        }

        .flashcard-back {
            background: #16213e;
            color: var(--gold);
            transform: rotateY(180deg);
            border-color: var(--gold);
        }

        .word-es {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .word-fr {
            font-size: 1.5rem;
            font-weight: 500;
            font-style: italic;
        }

        .category-tag {
            position: absolute;
            top: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 10px;
            color: var(--accent);
        }

        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.7rem;
            color: #666;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
        }

        .progress {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        @media (max-width: 400px) {
            .flashcard-container {
                width: 300px;
                height: 220px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="index.html" class="back-link">← Retour à la fiche</a>
        <h1>Révise ton Vocabulaire</h1>
        <p>Clique sur la carte pour voir la traduction.</p>
    </div>

    <div class="flashcard-container" id="card-container" onclick="flipCard()">
        <div class="flashcard-inner">
            <div class="flashcard-front">
                <span class="category-tag" id="category">Connecteur</span>
                <div class="word-es" id="word-es">Sin embargo</div>
                <span class="hint">Espagnol</span>
            </div>
            <div class="flashcard-back">
                <div class="word-fr" id="word-fr">Cependant</div>
                <span class="hint">Français</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-outline" onclick="prevCard()">Précédent</button>
        <button class="btn" onclick="nextCard()">Suivant</button>
        <button class="btn btn-outline" style="border-color: var(--gold); color: var(--gold);"
            onclick="shuffleCards()">Mélanger</button>
    </div>

    <div class="progress" id="progress">Carte 1 / 0</div>

    <script>
        const vocabData = [
            // Connecteurs
            { es: "sin embargo", fr: "cependant, pourtant", cat: "Connecteur" },
            { es: "además", fr: "de plus, en outre", cat: "Connecteur" },
            { es: "por lo tanto", fr: "par conséquent, donc", cat: "Connecteur" },
            { es: "no obstante", fr: "néanmoins, toutefois", cat: "Connecteur" },
            { es: "por eso / por ello", fr: "c'est pourquoi", cat: "Connecteur" },
            { es: "a pesar de (que)", fr: "malgré, bien que", cat: "Connecteur" },
            { es: "aunque", fr: "bien que, même si", cat: "Connecteur" },
            { es: "puesto que / ya que", fr: "puisque, étant donné que", cat: "Connecteur" },
            { es: "es decir", fr: "c'est-à-dire", cat: "Connecteur" },
            { es: "en cambio", fr: "en revanche", cat: "Connecteur" },
            { es: "de hecho", fr: "en fait, effectivement", cat: "Connecteur" },
            { es: "tanto… como", fr: "aussi bien… que", cat: "Connecteur" },

            // Société
            { es: "la juventud", fr: "la jeunesse", cat: "Société" },
            { es: "el paro / el desempleo", fr: "le chômage", cat: "Société" },
            { es: "la desigualdad", fr: "l'inégalité", cat: "Société" },
            { es: "el bienestar", fr: "le bien-être", cat: "Société" },
            { es: "la convivencia", fr: "le vivre ensemble", cat: "Société" },
            { es: "el ciudadano", fr: "le citoyen", cat: "Société" },
            { es: "el poder adquisitivo", fr: "le pouvoir d'achat", cat: "Société" },

            // Environnement
            { es: "el medio ambiente", fr: "l'environnement", cat: "Environnement" },
            { es: "el cambio climático", fr: "le changement climatique", cat: "Environnement" },
            { es: "el desarrollo sostenible", fr: "le développement durable", cat: "Environnement" },
            { es: "las redes sociales", fr: "les réseaux sociaux", cat: "Technologie" },
            { es: "la brecha digital", fr: "la fracture numérique", cat: "Technologie" },

            // Verbes
            { es: "afirmar / sostener", fr: "affirmer / soutenir", cat: "Verbe" },
            { es: "destacar", fr: "souligner, mettre en avant", cat: "Verbe" },
            { es: "señalar", fr: "indiquer, signaler", cat: "Verbe" },
            { es: "lograr / conseguir", fr: "réussir à, parvenir à", cat: "Verbe" },
            { es: "darse cuenta de", fr: "se rendre compte de", cat: "Verbe" },
            { es: "hacer frente a", fr: "faire face à", cat: "Verbe" },
            { es: "tener en cuenta", fr: "tenir compte de", cat: "Verbe" },
            { es: "llevar a cabo", fr: "mener à bien, réaliser", cat: "Verbe" },

            // Adjectifs / Adverbes
            { es: "actualmente", fr: "actuellement, de nos jours", cat: "Adverbe" },
            { es: "realmente", fr: "vraiment, réellement", cat: "Adverbe" },
            { es: "a menudo", fr: "souvent", cat: "Adverbe" },
            { es: "apenas", fr: "à peine", cat: "Adverbe" },
            { es: "imprescindible", fr: "indispensable", cat: "Adjectif" },
            { es: "llamativo", fr: "frappant, attirant l'attention", cat: "Adjectif" }
        ];

        let currentIndex = 0;
        let cards = [...vocabData];

        function updateCard() {
            const card = cards[currentIndex];
            const container = document.getElementById('card-container');

            // On retire la rotation avant de changer le texte
            container.classList.remove('flipped');

            setTimeout(() => {
                document.getElementById('word-es').textContent = card.es;
                document.getElementById('word-fr').textContent = card.fr;
                document.getElementById('category').textContent = card.cat;
                document.getElementById('progress').textContent = `Carte ${currentIndex + 1} / ${cards.length}`;
            }, 150);
        }

        function flipCard() {
            document.getElementById('card-container').classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % cards.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateCard();
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // Init
        updateCard();

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') flipCard();
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
        });
    </script>
</body>

</html>
