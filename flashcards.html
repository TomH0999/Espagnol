<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Vocabulaire - Bac Espagnol</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --red: #c0392b;
            --dark: #1a1a2e;
            --card: #0f3460;
            --accent: #e94560;
            --gold: #f5c518;
            --text: #eaeaea;
            --blue: #2980b9;
            --green: #27ae60;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            max-width: 600px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
            transition: 0.2s;
        }

        .back-link:hover {
            opacity: 0.8;
            transform: translateX(-5px);
        }

        /* MODE INDICATOR */
        .mode-indicator {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: 600;
        }

        /* FLASHCARD CONTAINER */
        .flashcard-container {
            perspective: 1000px;
            width: 380px;
            height: 260px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
        }

        .flashcard-container.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-sizing: border-box;
        }

        .flashcard-front {
            background: var(--card);
            color: white;
        }

        .flashcard-back {
            background: #16213e;
            color: var(--gold);
            transform: rotateY(180deg);
            border-color: var(--gold);
        }

        .word-text {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .category-tag {
            position: absolute;
            top: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 10px;
            color: var(--accent);
        }

        .hint {
            position: absolute;
            bottom: 15px;
            font-size: 0.75rem;
            color: var(--muted);
            opacity: 0.6;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
        }

        .btn-switch {
            background: var(--blue);
        }

        .btn-shuffle {
            background: var(--gold);
            color: var(--dark);
        }

        .progress {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #a0a8b8;
        }

        @media (max-width: 400px) {
            .flashcard-container {
                width: 320px;
                height: 230px;
            }

            .word-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <a href="index.html" class="back-link">← Retour à la fiche</a>
        <h1>🎴 Flashcards Vocabulaire</h1>
        <p>Entraîne-toi à mémoriser les mots clés du Bac.</p>
    </div>

    <div class="mode-indicator" id="mode-text">Mode : Espagnol ➔ Français</div>

    <div class="flashcard-container" id="card-container" onclick="flipCard()">
        <div class="flashcard-inner">
            <div class="flashcard-front">
                <span class="category-tag" id="category">Catégorie</span>
                <div class="word-text" id="front-text">Chargement...</div>
                <span class="hint" id="front-lang">Langue</span>
            </div>
            <div class="flashcard-back">
                <div class="word-text" id="back-text">...</div>
                <span class="hint" id="back-lang">Langue</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button class="btn btn-switch" onclick="toggleLanguageMode()">
                ⇄ Inverser les langues
            </button>
            <button class="btn btn-shuffle" onclick="shuffleCards()">
                🎲 Mélanger
            </button>
        </div>

        <div class="btn-group">
            <button class="btn btn-outline" onclick="prevCard()">Précédent</button>
            <button class="btn" onclick="nextCard()">Suivant</button>
        </div>

        <div class="progress" id="progress">Carte 1 / 0</div>
    </div>

    <script>
        // BASE DE DONNÉES DU VOCABULAIRE
        const vocabData = [
            // Connecteurs
            { es: "sin embargo", fr: "cependant, pourtant", cat: "Connecteur" },
            { es: "además", fr: "de plus, en outre", cat: "Connecteur" },
            { es: "por lo tanto", fr: "par conséquent, donc", cat: "Connecteur" },
            { es: "no obstante", fr: "néanmoins, toutefois", cat: "Connecteur" },
            { es: "por eso / por ello", fr: "c'est pourquoi", cat: "Connecteur" },
            { es: "a pesar de (que)", fr: "malgré, bien que", cat: "Connecteur" },
            { es: "aunque", fr: "bien que, même si", cat: "Connecteur" },
            { es: "puesto que / ya que", fr: "puisque, étant donné que", cat: "Connecteur" },
            { es: "es decir", fr: "c'est-à-dire", cat: "Connecteur" },
            { es: "en cambio", fr: "en revanche", cat: "Connecteur" },
            { es: "de hecho", fr: "en fait, effectivement", cat: "Connecteur" },
            { es: "en definitiva", fr: "en définitive, bref", cat: "Connecteur" },

            // Société & Jeunesse
            { es: "la juventud", fr: "la jeunesse", cat: "Société" },
            { es: "el paro / el desempleo", fr: "le chômage", cat: "Société" },
            { es: "la desigualdad", fr: "l'inégalité", cat: "Société" },
            { es: "el bienestar", fr: "le bien-être", cat: "Société" },
            { es: "la convivencia", fr: "le vivre ensemble", cat: "Société" },
            { es: "el ciudadano", fr: "le citoyen", cat: "Société" },
            { es: "el poder adquisitivo", fr: "le pouvoir d'achat", cat: "Société" },
            { es: "la pobreza", fr: "la pauvreté", cat: "Société" },

            // Environnement & Technologie
            { es: "el medio ambiente", fr: "l'environnement", cat: "Environnement" },
            { es: "el cambio climático", fr: "le changement climatique", cat: "Environnement" },
            { es: "el desarrollo sostenible", fr: "le développement durable", cat: "Environnement" },
            { es: "las redes sociales", fr: "les réseaux sociaux", cat: "Technologie" },
            { es: "la inteligencia artificial", fr: "l'intelligence artificielle", cat: "Technologie" },
            { es: "la brecha digital", fr: "la fracture numérique", cat: "Technologie" },

            // Verbes utiles
            { es: "afirmar / sostener", fr: "affirmer / soutenir", cat: "Verbe" },
            { es: "destacar", fr: "souligner, mettre en avant", cat: "Verbe" },
            { es: "señalar", fr: "indiquer, signaler", cat: "Verbe" },
            { es: "lograr / conseguir", fr: "réussir à, parvenir à", cat: "Verbe" },
            { es: "darse cuenta de", fr: "se rendre compte de", cat: "Verbe" },
            { es: "hacer frente a", fr: "faire face à", cat: "Verbe" },
            { es: "tener en cuenta", fr: "tenir compte de", cat: "Verbe" },
            { es: "llevar a cabo", fr: "mener à bien, réaliser", cat: "Verbe" },
            { es: "plantear", fr: "poser (un problème), soulever", cat: "Verbe" },

            // Adjectifs / Adverbes
            { es: "actualmente", fr: "actuellement, de nos jours", cat: "Adverbe" },
            { es: "realmente", fr: "vraiment, réellement", cat: "Adverbe" },
            { es: "a menudo", fr: "souvent", cat: "Adverbe" },
            { es: "apenas", fr: "à peine, presque pas", cat: "Adverbe" },
            { es: "imprescindible", fr: "indispensable", cat: "Adjectif" },
            { es: "llamativo", fr: "frappant, qui attire l'attention", cat: "Adjectif" }
        ];

        let currentIndex = 0;
        let cards = [...vocabData];
        let isSpanishToFrench = true; // Mode actuel

        function updateCard() {
            const card = cards[currentIndex];
            const container = document.getElementById('card-container');

            // On réinitialise la carte (face avant visible)
            container.classList.remove('flipped');

            // Petit délai pour laisser le temps à la transition de se faire si la carte était retournée
            setTimeout(() => {
                if (isSpanishToFrench) {
                    document.getElementById('front-text').textContent = card.es;
                    document.getElementById('back-text').textContent = card.fr;
                    document.getElementById('front-lang').textContent = "Espagnol (Cliquer pour voir)";
                    document.getElementById('back-lang').textContent = "Français";
                    document.getElementById('mode-text').textContent = "Mode : Espagnol ➔ Français";
                } else {
                    document.getElementById('front-text').textContent = card.fr;
                    document.getElementById('back-text').textContent = card.es;
                    document.getElementById('front-lang').textContent = "Français (Cliquer pour voir)";
                    document.getElementById('back-lang').textContent = "Espagnol";
                    document.getElementById('mode-text').textContent = "Mode : Français ➔ Espagnol";
                }

                document.getElementById('category').textContent = card.cat;
                document.getElementById('progress').textContent = `Carte ${currentIndex + 1} / ${cards.length}`;
            }, 100);
        }

        function flipCard() {
            document.getElementById('card-container').classList.toggle('flipped');
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % cards.length;
            updateCard();
        }

        function prevCard() {
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateCard();
        }

        function toggleLanguageMode() {
            isSpanishToFrench = !isSpanishToFrench;
            updateCard();
        }

        function shuffleCards() {
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // Initialisation
        updateCard();

        // Support clavier
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
            if (e.code === 'KeyM') toggleLanguageMode(); // Touche M pour Mode
        });
    </script>
</body>

</html>
